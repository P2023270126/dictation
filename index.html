<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>默書練習小助手</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <main class="app-shell">
    <section class="hero">
      <p class="eyebrow">Dictation Practice</p>
      <h1>默書練習小助手</h1>
      <p class="subtitle">從 Google Sheet 自動讀取最新默書文章，逐段慢速讀三次，連標點都讀出。</p>
    </section>

    <section class="card practice-card" aria-labelledby="practice-title">
      <div class="section-heading">
        <div>
          <h2 id="practice-title">默書播放</h2>
          <p id="statusText">正在讀取 Google Sheet 文章庫...</p>
        </div>

        <div class="language-control">
          <label for="languageMode">朗讀語言</label>
          <select id="languageMode">
            <option value="auto">自動</option>
            <option value="zh">中文</option>
            <option value="en">English</option>
          </select>
        </div>
      </div>

      <label for="articleSelect">選擇文章</label>
      <select id="articleSelect"></select>
      <p id="libraryStatus" class="small-status">文章庫會在頁面開啟時自動同步。</p>

      <div class="sentence-panel">
        <p class="sentence-label">小朋友練習畫面</p>
        <button id="startBtn" class="current-sentence masked start-panel">開始默書</button>
      </div>

      <div class="progress-wrap" aria-label="默書進度">
        <div class="progress-info">
          <span id="progressText">第 0 段 / 共 0 段</span>
          <span id="repeatText">等待開始</span>
        </div>
        <div class="progress-track">
          <div id="progressBar" class="progress-bar"></div>
        </div>
      </div>

      <div class="controls" aria-label="播放控制">
        <button id="prevBtn">上一句</button>
        <button id="nextBtn" class="primary-btn">下一句</button>
        <button id="replayBtn">重讀一次</button>
        <button id="readAllBtn" class="wide-btn">重讀全文</button>
        <button id="stopBtn" class="quiet-btn">停止朗讀</button>
      </div>

      <div id="completeMessage" class="complete-message" hidden>
        太好了！你已完成整篇默書。但記住睇多一次呀！叻仔！
      </div>
    </section>

    <section class="note">
      <h2>v8 說明</h2>
      <p>文章庫固定由指定 Google Sheet 自動讀取。練習畫面會隱藏文章內容，只保留文章題目、進度和控制按鈕。每段預設讀三次。朗讀功能使用瀏覽器內置 TTS，第一次播放需要你按一下按鈕。</p>
    </section>
  </main>

  <script src="script.js"></script>
</body>
</html>
